<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f9;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f1f1f;
        }
        .card {
            background: white;
            padding: 48px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 400;
        }
        p {
            color: #444746;
            margin-bottom: 32px;
        }
        .success-icon {
            color: #0b57d0;
            font-size: 64px;
            margin-bottom: 24px;
            line-height: 1;
        }
        .success-icon svg {
            width: 64px;
            height: 64px;
            fill: currentColor;
        }
        .btn-home {
            background-color: #0b57d0;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
            display: inline-block;
        }
        .btn-home:hover {
            background-color: #0842a0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h1>Login bem-sucedido!</h1>
        <p>Você concluiu o fluxo de autenticação e foi redirecionado com sucesso.</p>
        <a href="index.html" class="btn-home">Voltar ao Login</a>
    </div>
</body>
</html>
